name: Run New ETL Pipeline

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------
      # Checkout repo
      # -------------------
      - name: Checkout repo content
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # -------------------
      # Setup Python
      # -------------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # -------------------
      # Install dependencies
      # -------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install geckodriver for Selenium (Firefox is pre-installed on runner)
          wget -q https://github.com/mozilla/geckodriver/releases/download/v0.34.0/geckodriver-v0.34.0-linux64.tar.gz
          tar -xzf geckodriver-v0.34.0-linux64.tar.gz
          sudo mv geckodriver /usr/local/bin/
          rm geckodriver-v0.34.0-linux64.tar.gz

      # -------------------
      # Run ETL script
      # -------------------
      - name: Run many countries
        run: python main.py

      # -------------------
      # Debug
      # -------------------
      - name: Debug changes
        run: |
          ls -lh
          echo "Checking git status..."
          git status

      # -------------------
      # Commit if changed
      # -------------------
      - name: Commit updated csv
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add ExchangeRates.csv

          if ! git diff-index --quiet HEAD; then
            git commit -m "Update exchange rates"
            git fetch origin main
            git pull --rebase origin main
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
            
            echo "csv updated and pushed."
          else
            echo "No changes to commit"
          fi